<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      div {
        width: 150px;
        height: 50px;
        background-color: lightblue;
        margin:15px;
        padding:15px;
      }
      span {
        background-color: lightcoral;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
      }
      .inline-block{
        display: inline-block;
        width: 100px;
        height: 200px;
        background-color: yellowgreen;
      }
      .container{
        width: 100%;
        height: 100%;
        color: transparent;
      }
    </style>
</head>
<body>
    <div>
       b1
    </div>
    <div>
        b2
    </div>
    <span>i1</span>
    <span>i2</span>
    <div class="inline-block">i-b1</div>
    <div class="inline-block">i-b2</div>
    <div class="container">
        <div class="container">어쩌구</div>
    </div>
    <!-- -->
    <section>
        <!-- component = 재사용 가능, 디자인 요소를 하나로 묶은 요소, 일반적으로 화면 구성에서는 section-->
         <header>햄스터 소개</header>
         <nav>햄스터 메뉴</nav>
         <article>햄스터 내용</article>
         <footer>햄스터 푸터</footer>
    </section>
</body>
</html>
