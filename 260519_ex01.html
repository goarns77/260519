<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box-Sizing</title>
    <style>
      div {
        width: 200px;
        height: 100px;
        border: 5px solid green;
        padding: 20px;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <p>p 태그는 위아래 1줄의 여백 존재</p>
    <!--기본 박스 모델-->
    <div>
    1개 줄 전체를 차지
    </div>
    다음 텍스트가 p태그처럼 밀려남
    <!--
        안쪽 여백(padding)을 적용해도 박스의 크기는 변하지 않음

    -->
  </body>
</html>
